<html>
    <header>
        <title>The Virtual Reality Experience by Brandon Lin</title>
        <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
        <script src="script.js"></script>
        <script src="rhythm.js"></script>
        <script src="menu.js"></script>
        <script src="johtoanto1ankostereo.js"></script>
        <script src="monkeypaw3000.js"></script>
        <script src="enemy.js"></script>
        <script src="player.js"></script>
        <script src="input2inputPlayer.js"></script>
        <script src="stage.js"></script>
    </header>
    <body>
        <a-scene>
            <a-assets>
                <!-- Music -->
                <sound src="music/TechnotronicPumpUpTheJam.mp3" id="SongMenu"></sound>
                <sound src="music/OKKOtheme.mp3" id="Song1"></sound>
                <sound src="music/IWasMadeForLovinYou.mp3" id="Song2"></sound>
                <sound src="music/MCHammerCantTouchThis.mp3" id="Song3"></sound>
                <sound src="music/NiccoriSurveyTeam.mp3" id="Song4"></sound>
                <sound src="music/BasementJaxx.mp3" id="Song5"></sound>
                <sound src="music/PullOverThatmetalTooFast.mp3" id="Song6"></sound>
                <sound src="music/menuselect.mp3" id="menuselectchime"></sound>
                <!-- Music Labels-->
                <a-image src="musictextures/TechnotronicPumpUpTheJam.png" id="SongMenui"></a-image>
                <a-image src="musictextures/OKKO.jpg" id="Song1i"></a-image>
                <a-image src="musictextures/IWasMadeForLovinYouUKSingle.jpg" id="Song2i"></a-image>
                <a-image src="musictextures/Hammer_Touch.jpg" id="Song3i"></a-image>
                <a-image src="musictextures/NiccoriSurveyTeam.webp" id="Song4i"></a-image>
                <a-image src="musictextures/RomeoBasementJaxx.png" id="Song5i"></a-image>
                <!-- Models -->
                <a-gltf-model src="models/old_couch/scene.gltf" id="couch"></a-gltf-model>
                <!-- Face Maps-->
                <a-image src="facemaps/facemap1.webp" id="facemap1"></a-image>
                <a-image src="facemaps/facemap2.jpg" id="facemap2"></a-image>
                <a-image src="facemaps/facemap3.jpg" id="facemap3"></a-image>
                <!-- Textures -->
                <a-image src="textures/title.png" id="title"></a-image>
                <a-image src="textures/woodtexture.jpg" id="woodtexture"></a-image>
                <a-image src="textures/whitebricktexture.jpg" id="whitebricktexture"></a-image>
                <a-image src="textures/asbestostexture.jpg" id="asbestostexture"></a-image>
                <a-image src="textures/polishedConcreteTexture.webp" id="polishedconcretetexture"></a-image>
                <a-image src="textures/start1.png" id="start1"></a-image>
                <a-image src="textures/start2.png" id="start2"></a-image>
                <a-image src="textures/stats1.png" id="stats1"></a-image>
                <a-image src="textures/stats2.png" id="stats2"></a-image>
                <a-image src="textures/credits1.png" id="credits1"></a-image>
                <a-image src="textures/credits2.png" id="credits2"></a-image>
                <a-image src="textures/leathertexture.png" id="leathertexture"></a-image>
                <a-image src="textures/BigMike.jpg" id="bigmike"></a-image>
                <a-image src="textures/transferAttack1.png" id="transferAttack1"></a-image>
                <a-image src="textures/transferAttack2.png" id="transferAttack2"></a-image>
                <a-image src="textures/transferDefend1.png" id="transferDefend1"></a-image>
                <a-image src="textures/transferDefend2.png" id="transferDefend2"></a-image>
                <a-image src="textures/audience.png" id="audience"></a-image>
                <a-image src="textures/heaven360.jpg" id="heaven360"></a-image>
            </a-assets>
            <a-sky color="#1865ee"></a-sky>
            <a-camera position="4 14 8" id="secamMain" active="false" look-controls wasd-controls="fly: true">
                <a-cursor></a-cursor>
            </a-camera>
            <a-entity position="0 -20 0" id="character">
                <a-entity id="trueBase">
                  <a-entity position="0 4.2 0" rotation="0 0 0"> <!--Center Mass-->
                    <a-box position=".3 0 -.15" rotation="0 0 12" color="#ff0000"> <!--Hip L-->
                      <a-entity rotation="0 0 -6"> <!--Hip Joint L-->
                        <a-box position="0 -1.5 0" rotation="4 0 0" width=".7" height="1" depth=".7" color="#ff0000"></a-box> <!--Left Thigh 1-->
                        <a-box position="0 -.5 .05" width=".8" height="1.2" depth=".75" color="#ff0000"></a-box> <!--Left Thigh 2-->
                        <a-box position=".1 -.7 .05" rotation="4 0 -8"width=".7" height="1.4" depth=".75" color="#ff0000"></a-box> <!--Left Thigh 3-->
                        <a-entity position="0 -2 .05" rotation="0 0 -4"> <!--Left Knee Joint-->
                            <a-box rotation="12 0 0" width=".6" height=".5" depth=".55" color="#ff0000"></a-box> <!--Left Knee-->
                            <a-box position="0 -2 -.1" width=".55" height="1.2" depth=".5" color="#ff0000"></a-box> <!--Left Calf 1-->
                            <a-box position="0 -.9 -.1" rotation="2 0 0" width=".55" height="1.4" depth=".6" color="#ff0000"></a-box> <!--Left Calf 2-->
                            <a-entity position="0 -2.6 .12" rotation="0 -12 0" color="#ff0000"> <!--Left Foot Joint-->
                              <a-box position="0 0 0" rotation="0 15 0" width=".5" height=".3" color="#ff0000"></a-box> <!--Left Foot-->
                            </a-entity>
                        </a-entity>
                      </a-entity>
                    </a-box>
                    <a-box position="-.3 0 -.15" rotation="0 0 -12" color="#00ff00"> <!--Hip R-->
                      <a-entity rotation="0 0 6"> <!--Hip Joint R-->
                        <a-box position="0 -1.5 0" rotation="4 0 0" width=".7" height="1" depth=".7" color="#00ff00"></a-box> <!--Right Thigh 1-->
                        <a-box position="0 -.5 .05" width=".8" height="1.2" depth=".75" color="#00ff00"></a-box> <!--Right Thigh 2-->
                        <a-box position="-.1 -.7 .05" rotation="4 0 8" width=".7" height="1.4" depth=".75" color="#00ff00"></a-box> <!--Right Thigh 3-->
                        <a-entity position="0 -2 .05" rotation="0 0 4" color="#00ff00"> <!--Right Knee Joint-->
                            <a-box rotation="12 0 0" width=".55" height=".6" depth=".55" color="#00ff00"></a-box> <!--Right Knee-->
                            <a-box position="0 -2 -.1" width=".55" height="1.2" depth=".5" color="#00ff00"></a-box> <!--Right Calf 1-->
                            <a-box position="0 -.9 -.1" rotation="-2 0 0" width=".55" height="1.4" depth=".6" color="#00ff00"></a-box> <!--Right Calf 2-->
                            <a-entity position="0 -2.6 .12" rotation="0 12 0" color="#00ff00"> <!--Right Foot Joint-->
                              <a-box position="0 0 0" rotation="0 -15 0" width=".5" height=".3" color="#00ff00"></a-box> <!--Right Foot-->
                            </a-entity>
                        </a-entity>
                      </a-entity>
                    </a-box>
                    <a-box position="0 1 -.1" width="1.5" height="1.2" depth=".9" color="#0000ff"> <!--Gut-->
                      <a-entity position="0 .65 0"> <!--Gut Joint-->
                        <a-box position="0 .6 -.05" width="1.5" height="1.4" depth="1.1" color="#0000ff"></a-box> <!--Chest-->
                        <a-box position=".65 .5 -.05" rotation="0 0 -12" width=".5" height="1.6" depth="1.1" color="#0000ff"> <!--Chest L-->
                          <a-entity position=".2 .65 0" color="#0000ff"> <!--Left Shoulder Joint-->
                            <a-box position="0 0 -.1" width=".75" height=".5" depth=".75" color="#ffff00"></a-box> <!--Left Shoulder-->
                            <a-box position=".4 -.7 -.1" rotation="0 0 21" width=".65" height="1.5" depth=".65" color="#ffff00"></a-box> <!--Left Upper Arm-->
                            <a-entity position=".7 -1.4 -.1"> <!--Left Upper Arm Joint-->
                              <a-box position=".2 -.6" rotation="0 0 21" width=".60" height="1.5" depth=".60" color="#ffff00"></a-box> <!--Left Fore Arm-->
                              <a-entity position=".5 -1.3"> <!--Left Wrist Joint-->
                                <a-box position="0 -.4" rotation="0 0 6" width=".70" height="1" depth=".80" color="#ffff00"></a-box> <!--Left Fist-->
                              </a-entity>
                            </a-entity>
                          </a-entity>
                        </a-box> 
                        <a-box position="-.65 .5 -.05" rotation="0 0 12" width=".5" height="1.6" depth="1.1" color="#0000ff"> <!--Chest R-->
                          <a-entity position="-.2 .65 0"> <!--Right Shoulder Joint-->
                            <a-box position="0 0 -.1" width=".75" height=".5" depth=".75" color="#00ffff"></a-box> <!--Right Shoulder-->
                            <a-box position="-.4 -.7 -.1" rotation="0 0 -21" width=".65" height="1.5" depth=".65" color="#00ffff"></a-box> <!--Right Upper Arm-->
                            <a-entity position="-.7 -1.4 -.1"> <!--Right Upper Arm Joint-->
                              <a-box position="-.2 -.6" rotation="0 0 -21" width=".60" height="1.5" depth=".60" color="#00ffff"></a-box> <!--Right Fore Arm-->
                              <a-entity position="-.5 -1.3"> <!--Right Wrist Joint-->
                                <a-box position="0 -.4" rotation="0 0 -6" width=".70" height="1" depth=".80" color="#00ffff"></a-box> <!--Right Fist-->
                              </a-entity>
                            </a-entity>
                          </a-entity>
                        </a-box>
                        <a-entity position="0 1.3 0"> <!--Neck Joint-->
                          <a-box position=".5  0" rotation="0 0 -12" height=".5" color="#0000ff"></a-box> <!--Neck Part L-->
                          <a-box position="-.5  0" rotation="0 0 12" height=".5" color="#0000ff"></a-box> <!--Neck Part R-->
                          <a-box position="0 .1" height=".5" depth=".9" color="#ff00ff"></a-box> <!--Neck Part M-->
                          <a-box position="0 .1 -.1" width=".6" height="1" depth=".7" color="#ff00ff"></a-box> <!--Neck-->
                          <a-entity> <!--Head Joint-->
                            <a-box position="0 1" width=".9" height="1.1" depth=".9" color="#ff00ff"></a-box> <!--Head-->
                            <a-box position="0 1 .5" width=".9" height="1.1" depth=".1" src="#bigmike"></a-box> <!--Face Plate-->
                          </a-entity>
                        </a-entity>
                      </a-entity>
                    </a-box>
                  </a-entity>
                </a-entity>
            </a-entity>
            <a-entity id="set">
              <a-plane position="0 0 0" width="100" height="100" rotation="-90 0 0" color="#4F4F4F"src="#polishedconcretetexture" side="double"></a-plane>
              <a-box position="0 2 0" scale="25 5 25" color="#1171d1"></a-box>
              <a-box position="-12 5 -12" rotation="0 45 0" scale="2 12 2"></a-box>
              <a-box position="12 5 -12" rotation="0 45 0" scale="2 12 2"></a-box>
              <a-box position="-12 5 12" rotation="0 45 0" scale="2 12 2"></a-box>
              <a-cylinder position="0 6 -12" rotation="90 90 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="0 7.5 -12" rotation="90 90 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="0 9 -12" rotation="90 90 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="-12 6 0" rotation="90 0 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="-12 7.5 0" rotation="90 0 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="-12 9 0" rotation="90 0 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="12 6 0" rotation="90 0 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="12 7.5 0" rotation="90 0 0" scale=".4 22 .4"></a-cylinder>
              <a-cylinder position="12 9 0" rotation="90 0 0" scale=".4 22 .4"></a-cylinder>
              <a-image position="-24 9 0" rotation="0 90 0" scale="20 5 5" color="#ff0000" src="#audience"></a-image>
              <a-image position="-28 12 0" rotation="0 270 0" scale="20 5 5" color="#ff0000" src="#audience"></a-image>
              <a-image position="-32 15 0" rotation="0 270 0" scale="20 5 5" color="#ff0000" src="#audience"></a-image>
              <a-image position="-36 18 0" rotation="0 270 0" scale="20 5 5" color="#ff0000" src="#audience"></a-image>
              <a-image position="-40 21 0" rotation="0 270 0" scale="20 5 5" color="#ff0000" src="#audience"></a-image>
              <a-sphere scale="120 120 120" side="double" src="#heaven360"></a-sphere>
            </a-entity>
        </a-scene>
    </body>
</html>
